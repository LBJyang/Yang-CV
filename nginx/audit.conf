server {
    listen 80;
    server_name audit.lbjyang.com;

    location / {
        proxy_pass http://127.0.0.1:3000/audit/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Also proxy API requests for audit logs
    location /api/audit/ {
        proxy_pass http://127.0.0.1:3000/api/audit/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
